; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; PlatformIO configuration for CEE-PEW (ESP32-WROOM-32, ESP-IDF)
; Builds using the ESP-IDF framework. Also provides a native host test env.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
platform_packages = framework-espidf
monitor_speed = 115200
build_flags = -I include
lib_extra_dirs = lib

[env:host]
platform = native
board = native
framework = native

[platformio]
default_envs = esp32dev

; Notes:
; - The esp32dev env targets a generic ESP32 development board (ESP32-WROOM-32).
; - platform_packages pins framework-espidf to v6.x to match the project's ESP-IDF v6.0.1 target.
; - The host env is useful for running simple unit tests locally via PlatformIO's
;   native platform. Tests are placed under the test/ directory.
